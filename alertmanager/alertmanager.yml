global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'instance']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'ntfy'
  routes:
    # urgentアラートは即座に通知
    - match:
        severity: urgent
      group_wait: 10s
      repeat_interval: 1h
      receiver: 'ntfy'

receivers:
  - name: 'ntfy'
    webhook_configs:
      - url: 'http://alertmanager-ntfy:8080/hook'
        send_resolved: true

inhibit_rules:
  # CriticalDiskUsageが発火している場合、HighDiskUsageを抑制
  - source_match:
      alertname: CriticalDiskUsage
    target_match:
      alertname: HighDiskUsage
    equal: ['instance', 'mountpoint']
