[feature_toggles]
# Grafana 12 の Scene-based dashboard を無効化して Classic mode に戻す
# (Scene は "Loading plugin panel..." が長時間続く問題があり、
#  環境変数では無効化できないため ini で設定する必要がある)
dashboardScene = false
dashboardSceneForViewers = false
dashboardSceneSolo = false
publicDashboardsScene = false
preinstallAutoUpdate = false

[plugins]
# 未署名プラグインのプリインストールを無効化 (起動時間短縮、セキュリティ向上)
preinstall_disabled = true
public_key_retrieval_disabled = true
public_key_retrieval_on_startup = false

[analytics]
reporting_enabled = false
check_for_updates = false
check_for_plugin_updates = false
