http:
  addr: :8080

ntfy:
  baseurl: ${NTFY_URL}
  auth:
    basic:
      username: ${NTFY_USERNAME}
      password: ${NTFY_PASSWORD}
  notification:
    topic: ${NTFY_TOPIC}
    # severityに基づいて優先度を設定
    # urgent -> max (5), high -> high (4), warning -> default (3)
    priority: |
      alert.Labels["severity"] == "urgent" ? "max" :
      alert.Labels["severity"] == "critical" ? "max" :
      alert.Labels["severity"] == "high" ? "high" :
      alert.Labels["severity"] == "warning" ? "default" : "default"
    # アラートのタイトル
    title: |
      status == "firing" ? "[FIRING] " + alert.Labels["alertname"] : "[RESOLVED] " + alert.Labels["alertname"]
    # アラートの本文
    message: |
      alert.Annotations["summary"] != "" ? alert.Annotations["summary"] : alert.Annotations["description"]
    # タグ（アイコン）
    tags: |
      status == "firing" ? ["warning"] : ["white_check_mark"]
