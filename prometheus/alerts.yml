groups:
  - name: basic_alerts
    interval: 30s
    rules:
      # ターゲットダウン検知
      - alert: InstanceDown
        expr: up == 0
        for: 2m
        labels:
          severity: high
        annotations:
          summary: "インスタンス {{ $labels.instance }} がダウン"
          description: "{{ $labels.job }} のインスタンス {{ $labels.instance }} が2分以上応答していません。"

      # 高CPU使用率アラート
      - alert: HighCPUUsage
        expr: 100 - (avg by(instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: high
        annotations:
          summary: "{{ $labels.instance }} のCPU使用率が高い"
          description: "CPU使用率が {{ $value | printf \"%.1f\" }}% です（5分以上継続）。"

      # 高メモリ使用率アラート
      - alert: HighMemoryUsage
        expr: (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) / node_memory_MemTotal_bytes * 100 > 85
        for: 5m
        labels:
          severity: high
        annotations:
          summary: "{{ $labels.instance }} のメモリ使用率が高い"
          description: "メモリ使用率が {{ $value | printf \"%.1f\" }}% です。"

      # ディスク使用率アラート（実ディスクのみ）
      - alert: HighDiskUsage
        expr: |
          (node_filesystem_size_bytes{fstype=~"ext4|xfs|btrfs|zfs"} - node_filesystem_free_bytes{fstype=~"ext4|xfs|btrfs|zfs"})
          / node_filesystem_size_bytes{fstype=~"ext4|xfs|btrfs|zfs"} * 100 > 85
        for: 5m
        labels:
          severity: high
        annotations:
          summary: "{{ $labels.instance }} のディスク使用率が高い"
          description: "マウントポイント {{ $labels.mountpoint }} の使用率が {{ $value | printf \"%.1f\" }}% です。"

      # ディスク使用率危機アラート（実ディスクのみ）
      - alert: CriticalDiskUsage
        expr: |
          (node_filesystem_size_bytes{fstype=~"ext4|xfs|btrfs|zfs"} - node_filesystem_free_bytes{fstype=~"ext4|xfs|btrfs|zfs"})
          / node_filesystem_size_bytes{fstype=~"ext4|xfs|btrfs|zfs"} * 100 > 95
        for: 1m
        labels:
          severity: urgent
        annotations:
          summary: "{{ $labels.instance }} のディスク使用率が危機的"
          description: "マウントポイント {{ $labels.mountpoint }} の使用率が {{ $value | printf \"%.1f\" }}% です。即座に対応が必要です。"

  - name: smart_alerts
    interval: 60s
    rules:
      # SMART総合ステータス異常
      - alert: SmartStatusFailed
        expr: smartctl_device_smart_status != 1
        for: 1m
        labels:
          severity: urgent
        annotations:
          summary: "{{ $labels.instance }} の {{ $labels.device }} SMART異常"
          description: "デバイス {{ $labels.device }} のSMART総合ステータスが異常です。ディスク交換を検討してください。"

      # NVMe寿命消費率（80%以上で警告）
      - alert: NvmePercentageUsed
        expr: smartctl_device_percentage_used > 80
        for: 5m
        labels:
          severity: high
        annotations:
          summary: "{{ $labels.instance }} の {{ $labels.device }} NVMe寿命消費率高"
          description: "NVMeデバイス {{ $labels.device }} の寿命消費率が {{ $value }}% です。交換を計画してください。"

      # NVMe予備領域不足
      - alert: NvmeAvailableSpareLow
        expr: smartctl_device_available_spare <= on(instance, device) smartctl_device_available_spare_threshold
        for: 5m
        labels:
          severity: urgent
        annotations:
          summary: "{{ $labels.instance }} の {{ $labels.device }} NVMe予備領域不足"
          description: "NVMeデバイス {{ $labels.device }} の予備領域がしきい値以下です。即座に交換が必要です。"

      # NVMeメディアエラー
      - alert: NvmeMediaErrors
        expr: smartctl_device_media_errors > 0
        for: 1m
        labels:
          severity: urgent
        annotations:
          summary: "{{ $labels.instance }} の {{ $labels.device }} NVMeメディアエラー"
          description: "NVMeデバイス {{ $labels.device }} でメディアエラーが {{ $value }} 件発生しています。"

      # SCSI不良セクタリスト（G-List）
      - alert: ScsiGrownDefects
        expr: smartctl_scsi_grown_defect_list > 0
        for: 5m
        labels:
          severity: high
        annotations:
          summary: "{{ $labels.instance }} の {{ $labels.device }} 不良セクタ検出"
          description: "SCSI/SASデバイス {{ $labels.device }} で {{ $value }} 個の不良セクタが検出されています。"

      # HDD代替セクタ（Reallocated Sector Count）
      - alert: ReallocatedSectors
        expr: smartctl_device_attribute{attribute_name="Reallocated_Sector_Ct", attribute_value_type="raw"} > 0
        for: 5m
        labels:
          severity: high
        annotations:
          summary: "{{ $labels.instance }} の {{ $labels.device }} 代替セクタ検出"
          description: "デバイス {{ $labels.device }} で {{ $value }} 個の代替セクタが発生しています。ディスクの劣化が進行中です。"

      # HDD保留セクタ（Current Pending Sector）
      - alert: PendingSectors
        expr: smartctl_device_attribute{attribute_name="Current_Pending_Sector", attribute_value_type="raw"} > 0
        for: 5m
        labels:
          severity: high
        annotations:
          summary: "{{ $labels.instance }} の {{ $labels.device }} 保留セクタ検出"
          description: "デバイス {{ $labels.device }} で {{ $value }} 個の保留セクタが発生しています。"

      # HDD訂正不能セクタ（Offline Uncorrectable）
      - alert: UncorrectableSectors
        expr: smartctl_device_attribute{attribute_name="Offline_Uncorrectable", attribute_value_type="raw"} > 0
        for: 1m
        labels:
          severity: urgent
        annotations:
          summary: "{{ $labels.instance }} の {{ $labels.device }} 訂正不能セクタ検出"
          description: "デバイス {{ $labels.device }} で {{ $value }} 個の訂正不能セクタが発生しています。データ損失のリスクがあります。"
