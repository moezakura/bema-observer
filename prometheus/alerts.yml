groups:
  - name: basic_alerts
    interval: 30s
    rules:
      # Prometheusのターゲットダウン検知
      - alert: InstanceDown
        expr: up == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "インスタンス {{ $labels.instance }} がダウンしています"
          description: "{{ $labels.job }} のインスタンス {{ $labels.instance }} が5分以上応答していません。"

      # 高CPU使用率アラート（Node Exporterが有効な場合）
