global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'bema-observer'

# アラートマネージャーの設定（オプション）
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets:
#           - alertmanager:9093

# ルールファイルの読み込み
rule_files:
  - "alerts.yml"
  - "rules/*.yml"

# スクレイプ設定
scrape_configs:
  # Prometheus自身の監視
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          instance: 'prometheus'

  # Node Exporter（ホストメトリクス収集）
  # APIで動的に管理されるnode-exporterのターゲット
  - job_name: 'node'
    file_sd_configs:
      - files:
          - '/etc/prometheus/targets/node-exporters.json'
        refresh_interval: 30s

  # cAdvisor（コンテナメトリクス収集）
  # - job_name: 'cadvisor'
  #   static_configs:
  #     - targets: ['cadvisor:8080']
  #       labels:
  #         instance: 'cadvisor'

  # カスタムアプリケーションメトリクス
  # - job_name: 'myapp'
  #   static_configs:
  #     - targets: ['myapp:8080']
  #       labels:
  #         instance: 'myapp'

    relabel_configs:
      # __address__をnode_addressラベルとして保存
      - source_labels: [__address__]
        target_label: 'node_address'
      
      # または、IPアドレス部分のみを抽出
      - source_labels: [__address__]
        regex: '([^:]+):.*'
        target_label: 'node_ip'
        replacement: '$1'
