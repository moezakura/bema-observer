version: '3.8'

services:
  prometheus:
    image: prom/prometheus:v3.6.0
    container_name: prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=5y'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
      - '--web.listen-address=0.0.0.0:9090'
    ports:
      - "0.0.0.0:9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - ./prometheus/targets:/etc/prometheus/targets:rw
      - prometheus_data:/prometheus
    networks:
      - monitoring

  node-exporter-api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: node-exporter-api
    restart: unless-stopped
    environment:
      - NODE_TARGETS_FILE=/etc/prometheus/targets/node-exporters.json
      - SMART_TARGETS_FILE=/etc/prometheus/targets/smart-exporters.json
      - PROMETHEUS_URL=http://prometheus:9090
    ports:
      - "0.0.0.0:5000:5000"
    volumes:
      - ./prometheus/targets:/etc/prometheus/targets:rw
    networks:
      - monitoring
    depends_on:
      - prometheus

  grafana:
    image: grafana/grafana:12.2.0
    container_name: grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=
      - GF_SERVER_HTTP_ADDR=0.0.0.0
    ports:
      - "0.0.0.0:3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    networks:
      - monitoring
    depends_on:
      - prometheus

  alertmanager:
    image: prom/alertmanager:v0.28.1
    container_name: alertmanager
    restart: unless-stopped
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--web.listen-address=0.0.0.0:9093'
    ports:
      - "0.0.0.0:9093:9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    networks:
      - monitoring

  alertmanager-ntfy-init:
    image: alpine:3.20
    container_name: alertmanager-ntfy-init
    env_file:
      - .env
    volumes:
      - ./alertmanager-ntfy/config.yml.template:/template/config.yml.template:ro
      - alertmanager_ntfy_config:/config
    command: ["/bin/sh", "-c", "apk add --no-cache gettext && envsubst < /template/config.yml.template > /config/config.yml"]
    networks:
      - monitoring

  alertmanager-ntfy:
    image: ghcr.io/alexbakker/alertmanager-ntfy:1.0.2
    container_name: alertmanager-ntfy
    restart: unless-stopped
    volumes:
      - alertmanager_ntfy_config:/config:ro
    command: ["--configs=/config/config.yml"]
    networks:
      - monitoring
    depends_on:
      alertmanager-ntfy-init:
        condition: service_completed_successfully
      alertmanager:
        condition: service_started

networks:
  monitoring:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:
  alertmanager_data:
  alertmanager_ntfy_config:
